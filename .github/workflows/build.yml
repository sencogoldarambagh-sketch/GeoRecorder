name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # or ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          # Optional: buildozer_version: master   # or 'stable' (default is usually fine)
          command: buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: georecorder-apk
          path: ${{ steps.buildozer.outputs.filename }}   # This action provides the output path automatically
          # Alternative if above doesn't work: path: bin/*.apk
